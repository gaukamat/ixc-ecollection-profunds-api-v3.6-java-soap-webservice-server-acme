# Intimation
XC00001E=Unsupported API version.
XC00002E=Request ID not found in the request message.
XC00003E=Request Date Time not found in the request message.
XC00004E=Invalid priority code.
XC00005E=Required fields pertaining to a resent message, not found.
XC00011E=Client / Business (Customer) has not subscribed for this service.
XC00031E=API version in the request does not match with the one in the response message received from the client.
XC00032E=Request ID  in the request does not match with the one in the response message received from the client.
XC00033E=Request Date Time in the request does not match with the one in the response message received from the client.
XC00034E=Priority Code in the request does not match with the one in the response message received from the client.
XC00035E=Resent Indicator in the request does not match with the one in the response message received from the client.
XC00091E=Communication error. Unable to connect to the client service.
XC00092E=Communication error. Client Service did not respond within the stipulated response period.
XC00093E=Communication error. Client Service unavailable.
XC00101E=Invalid request. One or more required fields not found or had values that were not valid.
XC00102E=Invalid response from client. One or more required fields not found.
XC00103E=Invalid response from client. Response could not be parsed.
XC00201I=No description found for the reason code.
XC00202I=OK.
XC00211I=Request accepted.
XC00212I=Request provisionally accepted.
XC00213I=Resource created.
XC00221E=Request rejected
XC00401E=Client Code is not valid.
XC00402E=Virtual Account Number is not valid.
XC00403E=Client Code & Virtual Account Number do not match.
XC00404E=Dedup check failed. Transaction ID duplicated.
XC00405E=Client (Beneficiary) account is invalid or does not match the Client Account Name.
XC00406E=Sender Bank''s IFSC code is not valid.
XC00407E=Client (Beneficiary) Bank''s IFSC code is not valid.
XC00408E=Client code not found.
XC00409E=Payment method not found.
XC00410E=Payment method is not valid.
XC00500E=Experienced an unexpected internal service failure.
XC00501W=Experiencing unexpected and intermittent service failures. One or more request were not processed.
XC00502E=Experienced an unexpected service timeout. Possible causes could be network latency or delayed client response.
XCG0400E=Invalid request. Unable to forward the request to the client API bridge service.
XC00104E=Invalid request caused a parsing failure at client end. Probably an API transformation error.
XC00441I=Client has confirmed this transaction to be a valid one.
XC00442E=Client has rejected this transaction.
XC00411E=Payment mode and Transaction ID type conflict.
XC00412E=Payment transactions not accepted for the currency.
